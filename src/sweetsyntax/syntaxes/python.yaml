name: Python
extension:
  - py
  - pyw

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  floorDivide: '//'
  modulo: '%'
  power: '**'
  assign: '='
  eq: '=='
  ne: '!='
  lt: '<'
  lte: '<='
  gt: '>'
  gte: '>='
  and: '&'
  or: '|'
  xor: '^'
  not: 'not'
  tilde: '~'
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  floorDivideAssign: '//='
  moduloAssign: '%='
  powerAssign: '**='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  arrow: '->'
  walrus: ':='
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  colon: ':'
  scolon: ';'
  comma: ','
  dot: '.'
  ellipsis: '...'

identifiers:
  and: "and"
  as: "as"
  assert: "assert"
  break: "break"
  class: "class"
  continue: "continue"
  def: "def"
  del: "del"
  elif: "elif"
  else: "else"
  except: "except"
  False: "False"
  finally: "finally"
  for: "for"
  from: "from"
  global: "global"
  if: "if"
  import: "import"
  in: "in"
  is: "is"
  lambda: "lambda"
  None: "None"
  nonlocal: "nonlocal"
  not: "not"
  or: "or"
  pass: "pass"
  raise: "raise"
  return: "return"
  True: "True"
  try: "try"
  while: "while"
  with: "with"
  yield: "yield"