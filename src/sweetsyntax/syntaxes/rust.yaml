name: Rust
extension:
  - rs

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  modulo: '%'
  assign: '='
  eq: '=='
  ne: '!='
  lt: '<'
  lte: '<='
  gt: '>'
  gte: '>='
  and: '&'
  or: '|'
  xor: '^'
  not: '!'
  tilde: '~'
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  moduloAssign: '%='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  arrow: '->'
  fatArrow: '=>'
  doubleColon: '::'
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  backtick: '`'
  colon: ':'
  scolon: ';'
  comma: ','
  dot: '.'
  ellipsis: '...'
  range: '..'
  exclRange: '..='
  at: '@'
  dollar: '$'
  question: '?'

identifiers:
  as: "as"
  async: "async"
  await: "await"
  break: "break"
  const: "const"
  continue: "continue"
  crate: "crate"
  dyn: "dyn"
  else: "else"
  enum: "enum"
  extern: "extern"
  false: "false"
  fn: "fn"
  for: "for"
  if: "if"
  impl: "impl"
  in: "in"
  let: "let"
  loop: "loop"
  match: "match"
  mod: "mod"
  move: "move"
  mut: "mut"
  pub: "pub"
  ref: "ref"
  return: "return"
  self: "self"
  Self: "Self"
  static: "static"
  struct: "struct"
  super: "super"
  trait: "trait"
  true: "true"
  type: "type"
  unsafe: "unsafe"
  use: "use"
  where: "where"
  while: "while"
  union: "union"