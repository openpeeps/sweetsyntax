name: JavaScript
extension: 
  - js
  - jsx
  - ts
  - tsx

inline_comment: '//'
block_comment:
  - '/*'
  - '*/'

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  modulo: '%'
  assign: '='
  eq: '=='
  eqStrict: '==='
  ne: '!='
  neStrict: '!=='
  or: '||'
  gt: '>'
  gte: '>='
  lt: '<'
  lte: '<='
  tilde: '~'
  hash: '#'
  pipe: '|'
  and: '&'
  andand: '&&'
  andeq: '&='
  not: '!'
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '\"'
  colon: ':'
  scolon: ';'
  question: '?'
  comma: ','
  dot: '.'

identifiers:
  await: "await" 
  bool: "true"
  break: "break"
  case: "case"
  catch: "catch"
  class: "class"
  const: "const"
  continue: "continue"
  debugger: "debugger"
  default: "default"
  delete: "delete"
  do: "do"
  echo: "echo"
  else: "else"
  export: "export"
  extends: "extends"
  finally: "finally"
  for: "for"
  from: "from"
  function: "function"
  if: "if"
  import: "import"
  in: "in"
  instanceof: "instanceof"
  implements: "implements"
  let: "let"
  new: "new"
  public: "public"
  protected: "protected"
  private: "private"
  return: "return"
  super: "super"
  switch: "switch"
  this: "this"
  throw: "throw"
  try: "try"
  typeof: "typeof"
  var: "var"
  void: "void"
  while: "while"
  with: "with"
  yield: "yield"
  true: "true"
  false: "false"

filters:
  - name: class_decl
    pattern: 'class\s+([A-Za-z_][A-Za-z0-9_]*)'
    group: 1
    attr: class_name
  - name: function_call
    pattern: '([A-Za-z_][A-Za-z0-9_]*)\s*\('
    group: 1
    attr: function_call
  - name: function_decl
    pattern: 'function\s+([A-Za-z_][A-Za-z0-9_]*)'
    group: 1
    attr: function_name
  - name: arrow_function
    pattern: '([A-Za-z_][A-Za-z0-9_]*)\s*=\s*\(.*?\)\s*=>'
    group: 1
    attr: function_name
  - name: variable_decl
    pattern: '\b(var|let|const)\s+([A-Za-z_][A-Za-z0-9_]*)'
    group: 2
    attr: variable_name
  - name: number_literal
    pattern: '\b([0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?)\b'
    group: 1
    attr: number
  - name: string_literal_single
    pattern: "'([^'\\]*(?:\\.[^'\\]*)*)'"
    group: 0
    attr: string
  - name: string_literal_double
    pattern: '"([^"\\]*(?:\\.[^"\\]*)*)"'
    group: 0
    attr: string
  - name: template_literal
    pattern: '`([^`\\]*(?:\\.[^`\\]*)*)`'
    group: 0
    attr: string
  - name: comment_single
    pattern: '//.*'
    group: 0
    attr: comment
  - name: comment_multi
    pattern: '/\*[\s\S]*?\*/'
    group: 0
    attr: comment
  - name: property_access
    pattern: '\.([A-Za-z_][A-Za-z0-9_]*)'
    group: 1
    attr: property
  - name: import_from
    pattern: 'import\s+([A-Za-z_][A-Za-z0-9_{}*,\s]*)\s+from'
    group: 1
    attr: import_name
  - name: export_decl
    pattern: 'export\s+(default\s+)?([A-Za-z_][A-Za-z0-9_]*)'
    group: 2
    attr: export_name
  - name: regex_literal
    pattern: '/([^/\\]*(?:\\.[^/\\]*)*)/[gimsuy]*'
    group: 0
    attr: regex

definitions:
  - name: import
    pattern:
      - [string]
      - [from, string]