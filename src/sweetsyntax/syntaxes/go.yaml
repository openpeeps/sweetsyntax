name: Go
extension:
  - go

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  modulo: '%'
  assign: '='
  eq: '=='
  ne: '!='
  lt: '<'
  lte: '<='
  gt: '>'
  gte: '>='
  and: '&'
  or: '|'
  xor: '^'
  andNot: '&^'
  not: '!'
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  moduloAssign: '%='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  andNotAssign: '&^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  increment: '++'
  decrement: '--'
  arrow: '<-'
  define: ':='
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  colon: ':'
  scolon: ';'
  comma: ','
  dot: '.'
  ellipsis: '...'
  backtick: '`'

identifiers:
  break: "break"
  case: "case"
  chan: "chan"
  const: "const"
  continue: "continue"
  default: "default"
  defer: "defer"
  else: "else"
  fallthrough: "fallthrough"
  for: "for"
  func: "func"
  go: "go"
  goto: "goto"
  if: "if"
  import: "import"
  interface: "interface"
  map: "map"
  package: "package"
  range: "range"
  return: "return"
  select: "select"
  struct: "struct"
  switch: "switch"
  type: "type"
  var: "var"
  true: "true"
  false: "false"
  nil: "nil"

definitions:
  - name: import
    pattern: [import, string, ]