name: Nim
extension:
  - nim
  - nims
  - nimble

inline_comment: '#'
block_comment:
  - '#['
  - ']#'

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  assign: '='
  eq: '=='
  ne: '!='
  lt: '<'
  lte: '<='
  gt: '>'
  gte: '>='
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  moduloAssign: '%='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  arrow: '->'
  fatArrow: '=>'
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  colon: ':'
  scolon: ';'
  comma: ','
  dot: '.'
  ellipsis: '..'
  tripleDot: '...'
  rangeExcl: '..<'
  at: '@'
  dollar: '$'
  backtick: '`'
  question: '?'
  pragmaOpen: '{.'
  pragmaClose: '.}'
  ampersand: '&'
  pipe: '|'
  caret: '^'
  tilde: '~'

identifiers:
  addr: "addr"
  and: "and"
  as: "as"
  asm: "asm"
  bind: "bind"
  block: "block"
  break: "break"
  case: "case"
  cast: "cast"
  concept: "concept"
  const: "const"
  continue: "continue"
  converter: "converter"
  defer: "defer"
  discard: "discard"
  distinct: "distinct"
  div: "div"
  do: "do"
  elif: "elif"
  else: "else"
  end: "end"
  enum: "enum"
  except: "except"
  export: "export"
  finally: "finally"
  for: "for"
  from: "from"
  func: "func"
  if: "if"
  import: "import"
  in: "in"
  include: "include"
  interface: "interface"
  is: "is"
  isnot: "isnot"
  iterator: "iterator"
  let: "let"
  macro: "macro"
  method: "method"
  mixin: "mixin"
  mod: "mod"
  nil: "nil"
  not: "not"
  notin: "notin"
  object: "object"
  of: "of"
  or: "or"
  out: "out"
  proc: "proc"
  ptr: "ptr"
  raise: "raise"
  ref: "ref"
  return: "return"
  shl: "shl"
  shr: "shr"
  static: "static"
  template: "template"
  try: "try"
  tuple: "tuple"
  type: "type"
  var: "var"
  when: "when"
  while: "while"
  with: "with"
  without: "without"
  xor: "xor"
  yield: "yield"
  true: "true"
  false: "false"
  # Async/parallel
  async: "async"
  await: "await"
  spawn: "spawn"
  parallel: "parallel"

blocks:
  open: "{"
  close: "}"

features:
  regex_literals: false
  async_await: true
  generators: false
  arrow_functions: false
  template_literals: false
  labeled_statements: false

operators:
  prefix:
    - tokens: ["+", "-", "~"]
    - tokens: ["not"]
      is_keyword: true
    - tokens: ["sizeof", "typeof", "addr", "spawn", "await"]
      is_keyword: true
    - tokens: ["$"]
      handler: dollar

  postfix: []

  infix:
    - precedence: 1
      tokens: ["or", "xor"]
    - precedence: 2
      tokens: ["and"]
    - precedence: 3
      tokens: ["==", "!=", "<", "<=", ">", ">="]
      keywords: ["in", "notin", "is", "isnot", "of"]
    - precedence: 4
      tokens: ["..", "..<"]
    - precedence: 5
      tokens: ["&"]
    - precedence: 6
      tokens: ["|"]
    - precedence: 7
      tokens: ["^"]
    - precedence: 8
      tokens: ["<<", ">>"]
    - precedence: 9
      tokens: ["+", "-"]
    - precedence: 10
      tokens: ["*", "/", "div", "mod", "shl", "shr"]
    - precedence: 14
      tokens: ["."]
      handler: dot
    - precedence: 14
      tokens: ["["]
      handler: bracket
    - precedence: 15
      tokens: ["("]
      handler: call

  assignment:
    tokens: ["=", "+=", "-=", "*=", "/=", "%=",
             "&=", "|=", "^=", "<<=", ">>="]

statements:
  if_stmt:
    keyword: "if"
    handler: conditional
  elif_stmt:
    keyword: "elif"
    handler: conditional
  else_stmt:
    keyword: "else"
    handler: conditional
  when_stmt:
    keyword: "when"
    handler: conditional
  while_stmt:
    keyword: "while"
    handler: loop
  for_stmt:
    keyword: "for"
    handler: for_loop
  case_stmt:
    keyword: "case"
    handler: case
  try_stmt:
    keyword: "try"
    handler: try_catch
  return_stmt:
    keyword: "return"
    handler: return
  break_stmt:
    keyword: "break"
    handler: break
  continue_stmt:
    keyword: "continue"
    handler: continue
  block_stmt:
    keyword: "block"
    handler: block
  with_stmt:
    keyword: "with"
    handler: with
  without_stmt:
    keyword: "without"
    handler: without
  import_stmt:
    keyword: "import"
    handler: import
  from_stmt:
    keyword: "from"
    handler: from
  include_stmt:
    keyword: "include"
    handler: include
  export_stmt:
    keyword: "export"
    handler: export
  defer_stmt:
    keyword: "defer"
    handler: defer
  raise_stmt:
    keyword: "raise"
    handler: raise
  proc_decl:
    keyword: "proc"
    handler: function
  func_decl:
    keyword: "func"
    handler: function
  method_decl:
    keyword: "method"
    handler: function
  iterator_decl:
    keyword: "iterator"
    handler: function
  converter_decl:
    keyword: "converter"
    handler: function
  template_decl:
    keyword: "template"
    handler: macro
  macro_decl:
    keyword: "macro"
    handler: macro
  let_decl:
    keyword: "let"
    handler: declarator
  var_decl:
    keyword: "var"
    handler: declarator
  const_decl:
    keyword: "const"
    handler: declarator
  type_decl:
    keyword: "type"
    handler: type
  static_stmt:
    keyword: "static"
    handler: declarator
  asm_stmt:
    keyword: "asm"
    handler: asm
  discard_stmt:
    keyword: "discard"
    handler: discard
  yield_stmt:
    keyword: "yield"
    handler: yield
  do_stmt:
    keyword: "do"
    handler: do_block
  end_stmt:
    keyword: "end"
    handler: end