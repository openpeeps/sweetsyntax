name: Ruby
extension:
  - rb
  - ruby
  - rake
  - gemspec

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  modulo: '%'
  assign: '='
  eq: '=='
  eqStrict: '==='
  ne: '!='
  not: '!'
  gt: '>'
  gte: '>='
  lt: '<'
  lte: '<='
  spaceship: '<=>'
  or: '||'
  andand: '&&'
  and: '&'
  orSingle: '|'
  xor: '^'
  tilde: '~'
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  moduloAssign: '%='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  increment: '++' # Not valid in Ruby, but included for symmetry
  decrement: '--' # Not valid in Ruby, but included for symmetry
  arrow: '=>'
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  colon: ':'
  scolon: ';'
  question: '?'
  comma: ','
  at: '@'
  atat: '@@'
  dollar: '$'
  backslash: '\\'
  dot: '.'
  range: '..'
  exclRange: '...'

identifiers:
  alias: "alias"
  and: "and"
  begin: "begin"
  break: "break"
  case: "case"
  class: "class"
  def: "def"
  defined: "defined?"
  do: "do"
  else: "else"
  elsif: "elsif"
  end: "end"
  ensure: "ensure"
  false: "false"
  for: "for"
  if: "if"
  in: "in"
  module: "module"
  next: "next"
  nil: "nil"
  not: "not"
  or: "or"
  redo: "redo"
  rescue: "rescue"
  retry: "retry"
  return: "return"
  self: "self"
  super: "super"
  then: "then"
  true: "true"
  undef: "undef"
  unless: "unless"
  until: "until"
  when: "when"
  while: "while"
  yield: "yield"
  __FILE__: "__FILE__"
  __LINE__: "__LINE__"
  __ENCODING__: "__ENCODING__"