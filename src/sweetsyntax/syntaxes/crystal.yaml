name: Crystal
extension:
  - cr

symbols:
  plus: '+'
  minus: '-'
  multiply: '*'
  divide: '/'
  modulo: '%'
  power: '**'
  assign: '='
  eq: '=='
  ne: '!='
  eqStrict: '==='
  neStrict: '!=='
  lt: '<'
  lte: '<='
  gt: '>'
  gte: '>='
  and: '&'
  or: '|'
  xor: '^'
  not: '!'
  tilde: '~'
  shiftLeft: '<<'
  shiftRight: '>>'
  plusAssign: '+='
  minusAssign: '-='
  multiplyAssign: '*='
  divideAssign: '/='
  moduloAssign: '%='
  andAssign: '&='
  orAssign: '|='
  xorAssign: '^='
  shiftLeftAssign: '<<='
  shiftRightAssign: '>>='
  increment: '++'
  decrement: '--'
  arrow: '->'
  fatArrow: '=>'
  dot: '.'
  doubleDot: '..'
  tripleDot: '...'
  parl: '('
  parr: ')'
  sqbl: '['
  sqbr: ']'
  curl: '{'
  curr: '}'
  squote: "'"
  quote: '"'
  colon: ':'
  scolon: ';'
  comma: ','
  question: '?'
  at: '@'
  atat: '@@'
  dollar: '$'
  backtick: '`'
  underscore: '_'

identifiers:
  abstract: "abstract"
  alias: "alias"
  annotation: "annotation"
  as: "as"
  asm: "asm"
  begin: "begin"
  break: "break"
  case: "case"
  class: "class"
  def: "def"
  do: "do"
  else: "else"
  elsif: "elsif"
  end: "end"
  ensure: "ensure"
  enum: "enum"
  extend: "extend"
  false: "false"
  for: "for"
  fun: "fun"
  if: "if"
  in: "in"
  include: "include"
  instance_sizeof: "instance_sizeof"
  is_a?: "is_a?"
  lib: "lib"
  macro: "macro"
  module: "module"
  next: "next"
  nil: "nil"
  of: "of"
  out: "out"
  pointerof: "pointerof"
  private: "private"
  protected: "protected"
  require: "require"
  rescue: "rescue"
  respond_to?: "respond_to?"
  return: "return"
  self: "self"
  sizeof: "sizeof"
  struct: "struct"
  super: "super"
  then: "then"
  true: "true"
  type: "type"
  typeof: "typeof"
  union: "union"
  unless: "unless"
  until: "until"
  when: "when"
  while: "while"
  with: "with"
  yield: "yield"